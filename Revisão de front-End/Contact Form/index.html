<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Contatos</title>
    <link rel="stylesheet" href="./css/./style.css">
</head>

<body>

    <header class="form-header">
        <div class="container container--flex">
            <img src="./images/Driver.svg" alt="imagem de usuário ilustrativo" class="form-header__image-perfil">

            <h1 class="form-header__title">Contact Form</h1>
            <p class="form-header__text">Insira os dados do contato e clique em cadastrar!</p>
        </div>
    </header>


    </main>
    <div class="container">
        <form class="form-contact" action="">
            <div class="form-contact__linha">
                <div class="form-contact__col-a">
                    <label class="form-contact__label" for="nome">Nome</label>
                </div>
                <div class="form-contact__col-b">
                    <input class="form-contact__input form-contact__input--metade" type="text" id="nome" name="nome"
                        placeholder="nome">
                    <input class="form-contact__input form-contact__input--metade" type="text" id="sobrenome"
                        name="sobrenome" placeholder="sobrenome">
                </div>
            </div>

            <div class="container">
                <form class="form-contact" action="">
                    <div class="form-contact__linha">
                        <div class="form-contact__col-a">
                            <label class="form-contact__label" for="Email">Email</label>
                        </div>
                        <div class="form-contact__col-b">
                            <input class="form-contact__input form-contact__input--inteira" type="text" id="Email"
                                name="Email" placeholder="ex: fulano@email.com">

                        </div>
                    </div>

                    <div class="form-contact__linha">
                        <div class="form-contact__col-a">
                            <label class="form-contact__label" for="Telefone">Telefone</label>
                        </div>
                        <div class="form-contact__col-b">
                            <input class="form-contact__input form-contact__input--terco" type="text" id="+55"
                                name="+55" placeholder="+55">
                            <input class="form-contact__input form-contact__input--terco" type="text" id="ddd"
                                name="ddd" placeholder="ddd">
                            <input class="form-contact__input form-contact__input--terco" type="text"
                                id="ex: 99999-9999" name="ex: 99999-9999" placeholder="ex: 99999-9999">
                        </div>
                    </div>

                    <div class="form-contact__linha">
                        <div class="form-contact__col-a">
                            <label class="form-contact__label" for="Endereco">Endereço</label>
                        </div>
                        <div class="form-contact__col-b">
                            <input class="form-contact__input form-contact__input--quarto" type="text"
                                id="cep: 9999-999" name="cep: 9999-999" placeholder="cep: 9999-999">
                            <input class="form-contact__input form-contact__input--metade" type="text"
                                id="Rua Lá de casa" name="Rua Lá de casa" placeholder="Rua Lá de casa">
                            <input class="form-contact__input form-contact__input--quarto" type="text" id="ex: 555"
                                name="ex: 555" placeholder="ex: 555">
                        </div>
                    </div>

                    <div class="form-contact__linha">
                        <div class="form-contact__col-a">
                            <label class="form-contact__label" for="nome"></label>
                        </div>
                        <div class="form-contact__col-b">
                            <input class="form-contact__input form-contact__input--terco" type="text" id="Apart Bloco x"
                                name="Apart Bloco x" placeholder="Apart Bloco x">
                            <input class="form-contact__input form-contact__input--terco" type="text" id="Bairro"
                                name="Bairro" placeholder="Bairro">
                            <input class="form-contact__input form-contact__input--terco" type="text" id="Cidade"
                                name="Cidade" placeholder="Cidade">
                        </div>

                    </div>
                    <div class="form-contact__linha">
                        <div class="form-contact__col-a">
                            <label class="form-contact__label" for="Endereco"></label>
                        </div>
                        <div class="form-contact__col-b">
                            <input class="form-contact__input form-contact__input--terco" type="text" id="Estado"
                                name="Estado" placeholder="Estado">
                        </div>
                    </div>

                    <div class="form-contact__linha">
                        <div class="form-contact__col-a">
                            <label class="form-contact__label" for="Anotacoes">Anotações</label>
                        </div>
                        <div class="form-contact__col-b">
                            <textarea class="form-contact__input form-contact__input--textarea" type="text"
                                id="Anotacoes" name="Anotacoes" placeholder=" Suas anotacoes aqui"></textarea>
                        </div>
                    </div>

                    <div class="form-contact_linha">
                        <div class="form-contact_col-a"></div>
                        <div class="form-contact_col-b-botoes">
                            <button onclick="validarFormulario()" type="button">Cadastrar</button>
                            <button type="reset">Limpar</button>
                        </div>
                    </div>

            </div>
        </form>
    </div>
    <main>

        <footer>Todos os direitos reservados</footer>

<script src="./js/script.js"></script>

</body>

</html>
