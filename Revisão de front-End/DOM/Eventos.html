<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <h1>Bem vindo</h1>

    <div>
        <span id="nome-span"></span>
        <span id="sobrenome-span"></span>
    </div>



    <input type="text" id="nome" placeholder="Digite seu nome" onblur="criaSobrenome()"
        onkeyup="replicaNome(this.value)">

    <script>
        let criouSobrenome = false;

        function replicaSobrenome(sobrenome) {
            document.getElementById("sobrenome-span").textContent = sobrenome;
        }

        function replicaNome(nome) {
            document.getElementById("nome-span").textContent = nome;
        }

        function criaSobrenome() {

            if (!criouSobrenome) {
                document.body.innerHTML += `<input type="text" id="sobrenome" placeholder="Digite seu sobrenome" onkeyup="replicaSobrenome(this.value)">`;

                criouSobrenome = true;
            }

        }

        function trocaTitulo() {
            const novoTitulo = prompt("Digite seu nome ");

            document.title = ` Página do ${novoTitulo}`;
            document.body.innerHTML += `<h1>Página do ${novoTitulo} </h1>`;
        }
    </script>

</body>

</html>
