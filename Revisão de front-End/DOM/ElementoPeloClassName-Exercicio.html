<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .corsim {
            color: green;
        }

        .cornao {
            color: red;
        }
    </style>
</head>

<body>
    <input type="text" id="fruta" placeholder="Digite o nome da fruta">
    <select name="" id="nomeClasse">
        <option value="">Selecione</option>
        <option value="corsim">corsim</option>
        <option value="cornao">cornao</option>
    </select>

    <button type="button" onclick="cadastrarFruta()">Cadastrar</button>

    <ul id="listaFrutas">
        <li class="corsim">Amora</li>
    </ul>

    <script>
        function cadastrarFruta() {
            const fruta = document.getElementById("fruta").value;
            const nomeClasse = document.getElementById("nomeClasse").value;
            const listaFrutas = document.getElementById("listaFrutas");

            // console.log(nomeFruta);
            // console.log(nomeClasse);
            // console.log(listaFrutas);

            //validar que há campos sem preencher
            if (fruta.trim().length == 0 || nomeClasse.trim().length == 0) { //trim() remove os espaços em branco do início e do fim da string
                alert("Preencha todos os campos!");
                return false;
            }

         

           listaFrutas.innerHTML +=  `<li class="${nomeClasse}">${fruta}</li>`

            //limpar os campos após o cadastro
            document.getElementById("fruta").value = "";
            document.getElementById("nomeClasse").value = "";


        }
    </script>


</body>

</html>
